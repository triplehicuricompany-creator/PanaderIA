  <path d="M 842 921 Q 1088 773 1334 921" class="cut"/>
  <rect x="128" y="1120" width="736" height="46" rx="18" class="panel"/><text x="168" y="1151" class="small">Punto de control 1</text><rect x="128" y="1280" width="736" height="46" rx="18" class="panel"/><text x="168" y="1311" class="small">Punto de control 2</text><rect x="128" y="1440" width="736" height="46" rx="18" class="panel"/><text x="168" y="1471" class="small">Punto de control 3</text><rect x="128" y="1600" width="736" height="46" rx="18" class="panel"/><text x="168" y="1631" class="small">Punto de control 4</text>
  <rect x="128" y="1760" width="1344" height="110" rx="22" fill="#5f8f2b"/>
