<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">C05 · Fondo gráfico · Fermentación profesional</title>
  <desc id="desc">Recurso visual V1 para Fermentación profesional. Fondo visual para plataforma, sitio y presentaciones; sustituible por foto del obrador. Marcado de sustitución: SUSTITUIBLE POR FOTO/VIDEO REAL DE CHEF JUANOTE™.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#fffaf0"/><stop offset="1" stop-color="#fff4dc"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#6a3d1f" flood-opacity="0.22"/></filter>
    <style>
      .brand { font: 700 48px Georgia, serif; fill: #3a2416; }
      .label { font: 800 65px Arial, sans-serif; fill: #9b5b24; letter-spacing: 1px; }
      .body { font: 600 44px Arial, sans-serif; fill: #3a2416; }
      .small { font: 700 34px Arial, sans-serif; fill: #3a2416; }
      .badge { font: 800 26px Arial, sans-serif; fill: #fffaf0; letter-spacing: .8px; }
      .panel { fill: rgba(255,250,240,.82); stroke: #d99a2b; stroke-width: 3; }
      .bread { fill: #d99a2b; stroke: #9b5b24; stroke-width: 8; filter: url(#shadow); }
      .cut { fill: none; stroke: #fff4dc; stroke-width: 10; stroke-linecap: round; }
      .step { fill: #2b6f8f; stroke: #fffaf0; stroke-width: 6; }
      .stepText { font: 900 28px Arial, sans-serif; fill: #fffaf0; text-anchor: middle; }
      .flow { stroke: #2b6f8f; stroke-width: 10; stroke-linecap: round; }
      .chapterIcon { font: 900 180px Arial, sans-serif; fill: #9b5b24; text-anchor: middle; }
    </style>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
